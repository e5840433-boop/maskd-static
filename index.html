<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Фоновые блobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
        .blob-2 { width: 300px; height: 300px; background: #ec4899; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
        .blob-3 { width: 200px; height: 200px; background: #f59e0b; top: 40%; left: 50%; animation: float3 7s ease-in-out infinite; }

        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,20px)} }

        /* Карточка */
        .card {
            position: relative;
            z-index: 10;
            width: 360px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 36px 36px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: cardIn 0.6s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            width: 72px; height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            animation: iconPop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
        }

        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .topic-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.3s both;
        }

        .title {
            font-family: 'Unbounded', sans-serif;
            font-size: 18px;
            font-weight: 900;
            line-height: 1.35;
            color: #fff;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.35s both;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Кнопка */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: fadeUp 0.5s ease 0.5s both;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .btn:active { transform: scale(0.97); }
        .btn:active::after { background: rgba(255,255,255,0.1); }

        .btn .shimmer {
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            60%  { left: 150%; }
            100% { left: 150%; }
        }

        .btn span { position: relative; z-index: 1; }

        /* Футер */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            animation: fadeUp 0.5s ease 0.6s both;
            letter-spacing: 0.02em;
        }

        /* Состояние загрузки */
        .loading {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }

        .loading span {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.15s; }
        .loading span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40%          { transform: scale(1); opacity: 1; }
        }

        .question-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            text-align: left;
            animation: fadeUp 0.5s ease 0.35s both;
        }

        .question-box .question-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 6px;
        }

        .reply-textarea {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            padding: 14px 16px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            margin-bottom: 16px;
            min-height: 100px;
            box-sizing: border-box;
            animation: fadeUp 0.5s ease 0.4s both;
        }

        .reply-textarea::placeholder { color: rgba(255,255,255,0.3); }
        .reply-textarea:focus { border-color: rgba(167,139,250,0.5); }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">
    <div class="icon-wrap" id="icon">💌</div>
    <div class="topic-label" id="topicLabel">Maskd</div>
    <h1 class="title" id="title">💌 Отправь мне анонимное сообщение</h1>
    <div class="question-box" id="questionBox" style="display:none">
        <div class="question-label">Анонимное сообщение</div>
        <div id="questionText"></div>
    </div>
    <p class="subtitle" id="subtitle">Делитесь своей ссылкой — получайте сообщения от своих друзей и незнакомцев</p>
    <textarea class="reply-textarea" id="replyTextarea" placeholder="Напиши что-нибудь для сторис..." style="display:none"></textarea>
    <button class="btn" id="shareBtn" onclick="share()">
        <div class="shimmer"></div>
        <span>💌 Поделиться историей</span>
    </button>
</div>

<p class="footer">Maskd · анонимные сообщения</p>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const p = new URLSearchParams(window.location.search);
const topic = p.get('topic') || 'default';
const uid = p.get('uid') || '';
const bot = p.get('bot') || 'tbh_anon_bot';
const mode = p.get('mode') || '';
const question = p.get('question') || '';
const link = `https://t.me/${bot}?start=${uid}_${topic}`;

const REPLY_IMG = 'https://i.ibb.co/3YTLXFW7/Gemini-Generated-Image-t6e674t6e674t6e6.png';

const topics = {
    default:  { icon: '💌', title: 'Отправь мне анонимное сообщение', img: 'https://i.ibb.co/Ldpxk9z3/Chat-GPT-Image-19-2026-23-07-16.png' },
    confess:  { icon: '🫶', title: 'Признайся мне анонимно',           img: 'https://i.ibb.co/rGynp0vh/Chat-GPT-Image-19-2026-23-09-30.png' },
    describe: { icon: '✍️', title: 'Опиши меня тремя словами',         img: 'https://i.ibb.co/pjJvZ8Tg/Gemini-Generated-Image-jfasazjfasazjfas.png' },
    nhie:     { icon: '🙈', title: 'Никогда я не...',                   img: 'https://i.ibb.co/PsKhzvsz/Gemini-Generated-Image-85au1u85au1u85au.png' },
    ship:     { icon: '💘', title: 'С кем ты меня шипиришь?',          img: 'https://i.ibb.co/QFqgCdCQ/Gemini-Generated-Image-unuklgunuklgunuk.png' },
    change:   { icon: '🤔', title: 'Что бы ты изменил во мне, если бы мог?', img: 'https://i.ibb.co/3VkFGFR/Gemini-Generated-Image-emxbewemxbewemxb.png' },
    crush:    { icon: '😍', title: 'Кто твоя тайная симпатия?',        img: 'https://i.ibb.co/1YfTHBgL/Gemini-Generated-Image-mzlqo4mzlqo4mzlq.png' },
    truth:    { icon: '😈', title: 'Скажи мне правду, которую боишься говорить в лицо', img: 'https://i.ibb.co/XZpYCcY2/Gemini-Generated-Image-hzfq5shzfq5shzfq.png' },
};

const t = topics[topic] || topics.default;
const isReply = mode === 'reply';

document.getElementById('topicLabel').textContent = 'Maskd';

if (isReply) {
    document.getElementById('icon').textContent = '💬';
    document.getElementById('title').textContent = 'Ответить в сторис';
    document.getElementById('subtitle').style.display = 'none';
    document.getElementById('shareBtn').querySelector('span').textContent = '💬 Поделиться ответом';

    if (question) {
        document.getElementById('questionBox').style.display = 'block';
        document.getElementById('questionText').textContent = question;
    }
    document.getElementById('replyTextarea').style.display = 'block';
} else {
    document.getElementById('title').textContent = `${t.icon} ${t.title}`;
    document.getElementById('shareBtn').querySelector('span').textContent = '📤 Поделиться историей';
}

function share() {
    if (!tg.shareToStory) {
        tg.showAlert('Обновите Telegram до последней версии, чтобы поделиться в Stories.');
        return;
    }

    const btn = document.getElementById('shareBtn');
    btn.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    btn.disabled = true;

    let storyText;
    if (isReply) {
        const typed = document.getElementById('replyTextarea').value.trim();
        if (typed) {
            const q = question ? `❓ ${question}\n\n💬 ${typed}` : typed;
            storyText = `${q}\n\n${link}`;
        } else {
            storyText = `Мне написали анонимно! Напиши мне тоже 👇\n${link}`;
        }
    } else {
        storyText = `${t.icon} ${t.title} 👇\n${link}`;
    }

    tg.shareToStory(isReply ? REPLY_IMG : t.img, { text: storyText });

    const tgUser = tg.initDataUnsafe?.user || {};
    fetch('https://maskdbot.win/api/story-shared', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: tgUser.id, username: tgUser.username, first_name: tgUser.first_name, topic })
    }).catch(() => {});

    setTimeout(() => {
        const label = isReply ? '💬 Поделиться ответом' : `${t.icon} Поделиться историей`;
        btn.innerHTML = `<div class="shimmer"></div><span>${label}</span>`;
        btn.disabled = false;
    }, 2000);
}

if (!isReply) share();
</script>
</body>
</html>
