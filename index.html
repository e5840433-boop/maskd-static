<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Фоновые блobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
        .blob-2 { width: 300px; height: 300px; background: #ec4899; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
        .blob-3 { width: 200px; height: 200px; background: #f59e0b; top: 40%; left: 50%; animation: float3 7s ease-in-out infinite; }

        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,20px)} }

        /* Карточка */
        .card {
            position: relative;
            z-index: 10;
            width: 360px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 36px 36px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: cardIn 0.6s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            width: 72px; height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            animation: iconPop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
        }

        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .topic-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.3s both;
        }

        .title {
            font-family: 'Unbounded', sans-serif;
            font-size: 18px;
            font-weight: 900;
            line-height: 1.35;
            color: #fff;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.35s both;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Кнопка */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: fadeUp 0.5s ease 0.5s both;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .btn:active { transform: scale(0.97); }
        .btn:active::after { background: rgba(255,255,255,0.1); }

        .btn .shimmer {
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            60%  { left: 150%; }
            100% { left: 150%; }
        }

        .btn span { position: relative; z-index: 1; }

        /* Футер */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            animation: fadeUp 0.5s ease 0.6s both;
            letter-spacing: 0.02em;
        }

        /* Состояние загрузки */
        .loading {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }

        .loading span {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.15s; }
        .loading span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40%          { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">
    <div class="icon-wrap" id="icon">💌</div>
    <div class="topic-label" id="topicLabel">Maskd</div>
    <h1 class="title" id="title">💌 Отправь мне анонимное сообщение</h1>
    <p class="subtitle">Делитесь своей ссылкой — получайте сообщения от своих друзей и незнакомцев</p>
    <button class="btn" id="shareBtn" onclick="share()">
        <div class="shimmer"></div>
        <span>💌 Поделиться историей</span>
    </button>
</div>

<p class="footer">Maskd · анонимные сообщения</p>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const p = new URLSearchParams(window.location.search);
const topic = p.get('topic') || 'default';
const uid = p.get('uid') || '';
const bot = p.get('bot') || 'tbh_anon_bot';
const link = `https://t.me/${bot}?start=${uid}_${topic}`;

// Темы — иконки и тексты
const topics = {
    default:  { icon: '💌', title: 'Отправь мне анонимное сообщение' },
    confess:  { icon: '🫶', title: 'Признайся мне анонимно' },
    describe: { icon: '✍️', title: 'Опиши меня тремя словами' },
    nhie:     { icon: '🙈', title: 'Никогда я не...' },
    ship:     { icon: '💘', title: 'С кем ты меня шипиришь?' },
    change:   { icon: '🤔', title: 'Что бы ты изменил во мне, если бы мог?' },
    crush:    { icon: '😍', title: 'Кто твоя тайная симпатия?' },
    truth:    { icon: '😈', title: 'Скажи мне правду, которую боишься говорить в лицо' },
};

const t = topics[topic] || topics.default;
document.getElementById('icon').textContent = t.icon;
document.getElementById('topicLabel').textContent = 'Maskd';
document.getElementById('title').textContent = `${t.icon} ${t.title}`;
document.getElementById('shareBtn').querySelector('span').textContent = `📤 Поделиться историей`;

// Генерация картинки для Stories
function buildStoryImage() {
    const canvas = document.createElement('canvas');
    canvas.width = 1080;
    canvas.height = 1920;
    const ctx = canvas.getContext('2d');

    // Фон
    const bg = ctx.createLinearGradient(0, 0, 1080, 1920);
    bg.addColorStop(0, '#0f0720');
    bg.addColorStop(0.5, '#1e0a3c');
    bg.addColorStop(1, '#2d0a1e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, 1080, 1920);

    // Цветные blobs
    function drawBlob(x, y, r, color, alpha) {
        const rg = ctx.createRadialGradient(x, y, 0, x, y, r);
        rg.addColorStop(0, color.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
        rg.addColorStop(1, color.replace(')', ',0)').replace('rgb', 'rgba'));
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = rg;
        ctx.fill();
    }

    drawBlob(200, 400, 500, 'rgb(124,58,237)', 0.6);
    drawBlob(900, 1500, 450, 'rgb(236,72,153)', 0.55);
    drawBlob(540, 960, 300, 'rgb(245,158,11)', 0.2);

    // Карточка
    const cx = 540, cy = 960;
    const cw = 860, ch = 680;
    const rx = 60;

    ctx.save();
    roundRect(ctx, cx - cw/2, cy - ch/2, cw, ch, rx);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();

    // Иконка
    ctx.font = '160px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(t.icon, cx, cy - 160);

    // Градиентный лейбл — название продукта
    const gLabel = ctx.createLinearGradient(cx - 200, 0, cx + 200, 0);
    gLabel.addColorStop(0, '#a78bfa');
    gLabel.addColorStop(1, '#f472b6');
    ctx.fillStyle = gLabel;
    ctx.font = 'bold 56px sans-serif';
    ctx.fillText('Maskd', cx, cy - 30);

    // Заголовок — полный текст темы с переносом
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 76px sans-serif';
    const words = t.title.split(' ');
    const maxW = 820;
    let line = '', lines = [];
    for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
            lines.push(line);
            line = word;
        } else {
            line = test;
        }
    }
    if (line) lines.push(line);
    const lineH = 95;
    const startY = cy + 80 - ((lines.length - 1) * lineH) / 2;
    lines.forEach((l, i) => ctx.fillText(l, cx, startY + i * lineH));

    // Подпись
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = '52px sans-serif';
    ctx.fillText('Нажми на ссылку ниже 👇', cx, cy + 390);

    return canvas.toDataURL('image/jpeg', 0.93);
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function share() {
    if (!tg.shareToStory) {
        tg.showAlert('Обновите Telegram до последней версии, чтобы поделиться в Stories.');
        return;
    }

    const btn = document.getElementById('shareBtn');
    btn.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    btn.disabled = true;

    const dataUrl = buildStoryImage();
    tg.shareToStory(dataUrl, {
        text: `Скажи мне то, что боишься сказать в лицо 👇\n${link}`
    });
    setTimeout(() => {
        btn.innerHTML = `<div class="shimmer"></div><span>${t.icon} Поделиться историей</span>`;
        btn.disabled = false;
    }, 2000);
}
</script>
</body>
</html>
