<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Фоновые блobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            pointer-events: none;
        }
        .blob-1 { width: 400px; height: 400px; background: #7c3aed; top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
        .blob-2 { width: 300px; height: 300px; background: #ec4899; bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
        .blob-3 { width: 200px; height: 200px; background: #f59e0b; top: 40%; left: 50%; animation: float3 7s ease-in-out infinite; }

        @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,40px)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }
        @keyframes float3 { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,20px)} }

        /* Карточка */
        .card {
            position: relative;
            z-index: 10;
            width: 360px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 40px 36px 36px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: cardIn 0.6s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            width: 72px; height: 72px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
            animation: iconPop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
        }

        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.6); }
            to   { opacity: 1; transform: scale(1); }
        }

        .topic-label {
            font-family: 'Unbounded', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.3s both;
        }

        .title {
            font-family: 'Unbounded', sans-serif;
            font-size: 18px;
            font-weight: 900;
            line-height: 1.35;
            color: #fff;
            margin-bottom: 12px;
            animation: fadeUp 0.5s ease 0.35s both;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
            margin-bottom: 32px;
            animation: fadeUp 0.5s ease 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Кнопка */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            font-family: 'Unbounded', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
            animation: fadeUp 0.5s ease 0.5s both;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }

        .btn:active { transform: scale(0.97); }
        .btn:active::after { background: rgba(255,255,255,0.1); }

        .btn .shimmer {
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2.5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%   { left: -100%; }
            60%  { left: 150%; }
            100% { left: 150%; }
        }

        .btn span { position: relative; z-index: 1; }

        /* Футер */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            animation: fadeUp 0.5s ease 0.6s both;
            letter-spacing: 0.02em;
        }

        /* Состояние загрузки */
        .loading {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
        }

        .loading span {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: bounce 0.8s ease-in-out infinite;
        }

        .loading span:nth-child(2) { animation-delay: 0.15s; }
        .loading span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40%          { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">
    <div class="icon-wrap" id="icon">💌</div>
    <div class="topic-label" id="topicLabel">Maskd</div>
    <h1 class="title" id="title">💌 Отправь мне анонимное сообщение</h1>
    <p class="subtitle">Делитесь своей ссылкой — получайте сообщения от своих друзей и незнакомцев</p>
    <button class="btn" id="shareBtn" onclick="share()">
        <div class="shimmer"></div>
        <span>💌 Поделиться историей</span>
    </button>
</div>

<p class="footer">Maskd · анонимные сообщения</p>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const p = new URLSearchParams(window.location.search);
const topic = p.get('topic') || 'default';
const uid = p.get('uid') || '';
const bot = p.get('bot') || 'tbh_anon_bot';
const link = `https://t.me/${bot}?start=${uid}_${topic}`;

// Темы — иконки и тексты
const STORY_IMG = 'https://i.ibb.co/Ldpxk9z3/Chat-GPT-Image-19-2026-23-07-16.png';
const topics = {
    default:  { icon: '💌', title: 'Отправь мне анонимное сообщение', img: 'https://i.ibb.co/Ldpxk9z3/Chat-GPT-Image-19-2026-23-07-16.png' },
    confess:  { icon: '🫶', title: 'Признайся мне анонимно',           img: 'https://i.ibb.co/rGynp0vh/Chat-GPT-Image-19-2026-23-09-30.png' },
    describe: { icon: '✍️', title: 'Опиши меня тремя словами',         img: STORY_IMG },
    nhie:     { icon: '🙈', title: 'Никогда я не...',                   img: STORY_IMG },
    ship:     { icon: '💘', title: 'С кем ты меня шипиришь?',          img: STORY_IMG },
    change:   { icon: '🤔', title: 'Что бы ты изменил во мне, если бы мог?', img: STORY_IMG },
    crush:    { icon: '😍', title: 'Кто твоя тайная симпатия?',        img: STORY_IMG },
    truth:    { icon: '😈', title: 'Скажи мне правду, которую боишься говорить в лицо', img: STORY_IMG },
};

const t = topics[topic] || topics.default;
document.getElementById('icon').textContent = t.icon;
document.getElementById('topicLabel').textContent = 'Maskd';
document.getElementById('title').textContent = `${t.icon} ${t.title}`;
document.getElementById('shareBtn').querySelector('span').textContent = `📤 Поделиться историей`;

function share() {
    if (!tg.shareToStory) {
        tg.showAlert('Обновите Telegram до последней версии, чтобы поделиться в Stories.');
        return;
    }

    const btn = document.getElementById('shareBtn');
    btn.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
    btn.disabled = true;

    tg.shareToStory(t.img, {
        text: `Скажи мне то, что боишься сказать в лицо 👇\n${link}`
    });
    setTimeout(() => {
        btn.innerHTML = `<div class="shimmer"></div><span>${t.icon} Поделиться историей</span>`;
        btn.disabled = false;
    }, 2000);
}
</script>
</body>
</html>
